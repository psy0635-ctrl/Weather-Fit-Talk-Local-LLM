# Streamlit 앱의 기본 테마 설정 파일입니다.
# 이 파일이 있으면 run.bat에 긴 --theme 옵션을 매번 쓰지 않아도 됩니다.

[theme]
# 전체 테마를 어두운 모드로 시작합니다.
base = "dark"

# 앱 전체 배경색입니다.
backgroundColor = "#0E0E10"

# 사이드바, 카드 같은 보조 영역 배경색입니다.
secondaryBackgroundColor = "#111113"

# 기본 글자색입니다.
textColor = "#F0EBE0"

# 버튼, 강조선 등에 쓰는 포인트 색상입니다.
primaryColor = "#C8A96E"
